name: 🚀 Build and Push Docker Images to Docker Hub

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: rincon23/classmanager-backend:latest

      - name: 🧱 Push MySQL image
        run: |
          docker pull mysql:8.0
          docker tag mysql:8.0 rincon23/classmanager-db:latest
          docker push rincon23/classmanager-db:latest

      - name: 🧱 Push phpMyAdmin image
        run: |
          docker pull phpmyadmin/phpmyadmin:latest
          docker tag phpmyadmin/phpmyadmin:latest rincon23/classmanager-phpmyadmin:latest
          docker push rincon23/classmanager-phpmyadmin:latest
